name: CI/CD Pipeline

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: terraform-${{ github.ref }}
  cancel-in-progress: false

env:
  AWS_REGION: ap-south-1
  PROJECT_NAME: infra-pipeline
  APP_PORT: 3000
  TF_IN_AUTOMATION: true

# -------------------- JOB 1: LINT + SECURITY --------------------
jobs:
  lint:
    name: Lint and Security Scan
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.0

      - name: Terraform Validate - dev
        working-directory: terraform/envs/dev
        run: |
          terraform init -backend=false
          terraform validate

      - name: Terraform Validate - staging
        working-directory: terraform/envs/staging
        run: |
          terraform init -backend=false
          terraform validate

      - name: Terraform Validate - prod
        working-directory: terraform/envs/prod
        run: |
          terraform init -backend=false
          terraform validate

      - name: Install tflint
        run: curl -s https://raw.githubusercontent.com/terraform-linters/tflint/master/install_linux.sh | bash

      - name: Run tflint
        run: |
          cd terraform/modules/networking && tflint --init && tflint
          cd ../compute && tflint
          cd ../security && tflint
          cd ../monitoring && tflint

      - name: Run tfsec
        uses: aquasecurity/tfsec-action@v1.0.0
        with:
          working_directory: terraform
          soft_fail: true

# -------------------- JOB 2: COST --------------------
  infracost:
    name: Cost Estimation
    runs-on: ubuntu-latest
    needs: lint
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4

      - name: Setup Infracost
        uses: infracost/actions/setup@v3
        with:
          api-key: ${{ secrets.INFRACOST_API_KEY }}

      - name: Infracost staging
        run: infracost breakdown --path terraform/envs/staging --format table

      - name: Infracost prod
        run: infracost breakdown --path terraform/envs/prod --format table

# -------------------- JOB 3: BUILD --------------------
  build:
    name: Docker Build and Test
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - uses: actions/checkout@v4

      - name: Build image
        working-directory: apps
        run: docker build -t ${{ env.PROJECT_NAME }}:${{ github.sha }} .

      - name: Test container
        run: |
          docker run -d -p ${{ env.APP_PORT }}:${{ env.APP_PORT }} \
            --name test-app \
            ${{ env.PROJECT_NAME }}:${{ github.sha }}

          sleep 5
          curl -f http://localhost:${{ env.APP_PORT }}/health
          docker stop test-app

# -------------------- JOB 4: SECURITY SCAN --------------------
  trivy:
    name: Trivy Scan
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - name: Build image
        working-directory: apps
        run: docker build -t ${{ env.PROJECT_NAME }}:${{ github.sha }} .

      - name: Scan image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.PROJECT_NAME }}:${{ github.sha }}
          severity: CRITICAL,HIGH
          exit-code: 1

# -------------------- JOB 5: TERRAFORM STAGING INFRA --------------------
  terraform-staging:
    name: Terraform Staging Infra
    runs-on: ubuntu-latest
    needs: trivy

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        working-directory: terraform/envs/staging
        run: terraform init

      - name: Terraform Apply (Create Infra)
        working-directory: terraform/envs/staging
        run: terraform apply -auto-approve

# -------------------- JOB 6: PUSH --------------------
  push:
    name: Push to ECR
    runs-on: ubuntu-latest
    needs: terraform-staging
    outputs:
      image_uri: ${{ steps.build.outputs.image }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login ECR
        id: login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & Push
        id: build
        run: |
          IMAGE=${{ steps.login.outputs.registry }}/${{ env.PROJECT_NAME }}-staging:${{ github.sha }}
          docker build -t $IMAGE apps/
          docker push $IMAGE
          echo "image=$IMAGE" >> $GITHUB_OUTPUT

# -------------------- JOB 7: DEPLOY STAGING --------------------
  deploy-staging:
    name: Deploy Staging
    runs-on: ubuntu-latest
    needs: push
    environment: staging

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        working-directory: terraform/envs/staging
        run: terraform init

      - name: Terraform Plan
        working-directory: terraform/envs/staging
        run: |
          terraform plan \
          -lock-timeout=300s \
          -var="container_image=${{ needs.push.outputs.image_uri }}" \
          -out=tfplan

      - name: Terraform Apply
        working-directory: terraform/envs/staging
        run: terraform apply -auto-approve tfplan

# -------------------- JOB 8: APPROVAL --------------------
  approval:
    name: Manual Approval
    runs-on: ubuntu-latest
    needs: deploy-staging
    if: github.ref == 'refs/heads/main'
    environment: production

    steps:
      - run: echo "Approved"

# -------------------- JOB 9: DEPLOY PROD --------------------
  deploy-prod:
    name: Deploy Production
    runs-on: ubuntu-latest
    needs: [push, approval]
    if: github.ref == 'refs/heads/main'
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        working-directory: terraform/envs/prod
        run: terraform init

      - name: Terraform Plan
        working-directory: terraform/envs/prod
        run: |
          terraform plan \
          -lock-timeout=300s \
          -var="container_image=${{ needs.push.outputs.image_uri }}" \
          -out=tfplan

      - name: Terraform Apply
        working-directory: terraform/envs/prod
        run: terraform apply -auto-approve tfplan




